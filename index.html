<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاصيها</title>

<style>
body {
  margin: 0;
  font-family: Arial;
 body {
  background: #111827;
  color: white;
}
  color: #111827;
  text-align: center;
}

/* اللوجو */
.logo {
  width: 140px;
  margin-top: 20px;
}

/* كارد */
.card {
  background: #1f2937; /* غامق */
  color: white;        /* كل النص داخل الكارد أبيض */
  margin: 20px;
  padding: 25px;
  border-radius: 20px;
}

.card h2,
.card h3 {
  color: white;
}

/* زر رئيسي */
button {
  width: 90%;
  padding: 15px;
  font-size: 18px;
  background: #ff6a00; /* برتقالي اللوجو */
  border: none;
  border-radius: 12px;
  color: white;
  margin-top: 20px;
}

/* أزرار */
.btn {
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 16px;
}

/* ألوان */
.maps { background: #374151; }
.waze {
  background: #33ccff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- اللوجو -->
<img src="./logo.png" class="logo">

<div class="card">
  <h3>حدد موقعك حتى نوجهك لأقرب مركز</h3>
  <button onclick="findNearest()">📍 تحديد موقعي</button>
</div>

<div id="result"></div>

<script>
const branches = [
 {name:"دايتونا جيك2 الدورة شارع 60", lat:33.2330455, lng:44.3967521},
  {name:"المستنصرية", lat:33.3594789, lng:44.3953294},
   {name:"فحص باشا ساحة الواثق", lat:33.3140634, lng:44.4338601},
  {name:"فحص باشا علي الصالح", lat:33.34827561360025, lng:44.34224104588671},
  {name:"سونار العطاء", lat:33.76021493754072, lng:44.62939371142699},
 {name:"3D CAR سونار فحص السيارات", lat:33.3801123890219, lng:44.36327875832542},
  {name:"سونار الامان", lat:33.75798587085705, lng:44.62562667698385},
  {name:"سونار اوتو كار", lat:33.75692174221037, lng:44.62538636954892},
  {name:"توب كار الدورة", lat:33.259776625619835, lng:44.40968860737434},
  {name:"توب كار العامرية", lat:33.29226704514001, lng:44.28362009390121},
  {name:" المندلاوي CRC اربيل", lat:36.15585969539661, lng:44.00509193119207},
 {name:" المندلاوي CRC بغداد", lat:33.338151218107335, lng:44.41608458177996},
 {name:" كار سيرفس 1", lat:36.34777723520328, lng:43.191813902351605},
 {name:" كار سيرفس 2", lat:36.34326668259489, lng:43.19637154468125},
 {name:"سونار الساجي", lat:33.35679222535507, lng:44.44162764508388},
 {name:"سونار سليمانية بغداد", lat:33.358166599736265, lng:44.45794848893724},
 {name:"سونار المحترف", lat:36.3493518805496, lng:43.192858015845914},
 {name:"سونار الذهبي", lat:36.34212645216695, lng:43.19832670235172},
 {name:"سونار بغداد جكوك", lat:33.38269795555332, lng:44.30919126010147},
 {name:"سونار 3C CARابوغريب", lat:33.38269795555332, lng:44.30919126010147},
 {name:"مركز ثيتاسكان العراق", lat:33.42386529815881, lng:43.348802460100295},
 {name:"سونار بغداد الغزالية", lat:33.35301835489327, lng:44.277202602432},
 {name:"سونار سمارت جيك", lat:33.31667329150658, lng:44.48497467359775},
 {name:"سونار هيمي كار", lat:33.26956167721483, lng:44.319866873598805},
 {name:"سونار محمد الشمري", lat:32.53688734439567, lng:45.792810231287866},
  {name:"علي المندلاوي نفق الشرطة", lat:33.3065103, lng:44.3233576}
];

function distance(a,b,c,d){
  return Math.sqrt((a-c)**2 + (b-d)**2);
}

function showResult(branch){
  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>${branch.name}</h2>

      <a class="btn maps" target="_blank"
      href="https://www.google.com/maps/dir/?api=1&destination=${branch.lat},${branch.lng}">
      🚗 Google Maps
      </a>
     <a class="btn waze" onclick="openWaze(${branch.lat},${branch.lng})">
🧭 فتح Waze
</a>
    </div>
  `;
}

function openWaze(lat, lng){
  window.location = `waze://?ll=${lat},${lng}&navigate=yes`;

  setTimeout(()=>{
    window.location = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  },1500);
}

function findNearest(){
  navigator.geolocation.getCurrentPosition(function(pos){

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    let nearest = null;
    let min = Infinity;

    branches.forEach(function(b){
      let d = distance(lat,lng,b.lat,b.lng);
      if(d < min){
        min = d;
        nearest = b;
      }
    });

    showResult(nearest);

  }, function(){
    alert("فعل الموقع");
  });
}
</script>

</body>
</html>
