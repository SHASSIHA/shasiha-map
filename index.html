<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاصيها | أقرب مركز</title>

<style>
body {font-family: Arial; text-align:center; background:#f5f7fa;}
button {padding:15px 25px; font-size:18px; margin:10px; cursor:pointer;}
a {display:block; margin:10px; padding:10px; background:green; color:white; text-decoration:none;}
</style>
</head>

<body>

<h2>📍 تحديد أقرب مركز</h2>

<button onclick="findNearest()">تحديد موقعي</button>

<div id="result"></div>

<script>
const branches = [
  {name: "فرع زيونة", lat: 33.3152, lng: 44.3661},
  {name: "فرع المنصور", lat: 33.3064, lng: 44.3386}
];

function distance(a,b,c,d){
  return Math.sqrt((a-c)**2 + (b-d)**2);
}

function showResult(branch){
  document.getElementById("result").innerHTML = `
    <h3>${branch.name}</h3>

    <a target="_blank"
    href="https://www.google.com/maps/dir/?api=1&destination=${branch.lat},${branch.lng}">
    🚗 افتح Google Maps
    </a>

    <a target="_blank"
    href="https://waze.com/ul?ll=${branch.lat},${branch.lng}&navigate=yes">
    🧭 افتح Waze
    </a>
  `;
}

function findNearest(){

  if (!navigator.geolocation){
    alert("جهازك لا يدعم تحديد الموقع");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    let nearest = branches[0];
    let min = Infinity;

    branches.forEach(b=>{
      let d = distance(lat,lng,b.lat,b.lng);
      if(d<min){min=d; nearest=b;}
    });

    showResult(nearest);

  },()=>{
    alert("فعل الموقع (Location) من المتصفح");
  });

}
</script>

</body>
</html>
