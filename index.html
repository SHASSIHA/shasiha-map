<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاصيها</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.card {
  background: #1e293b;
  margin: 20px;
  padding: 25px;
  border-radius: 20px;
}

button {
  width: 90%;
  padding: 15px;
  font-size: 18px;
  background: #22c55e;
  border: none;
  border-radius: 12px;
  color: white;
  margin-top: 20px;
}

.btn {
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 16px;
}

.maps { background: #3b82f6; }
.waze { background: #06b6d4; }

</style>
</head>

<body>

<div class="header">🚗 شاصيها</div>

<div class="card">
  <h3>حدد موقعك حتى نوجهك لأقرب مركز</h3>
  <button onclick="findNearest()">📍 تحديد موقعي</button>
</div>

<div id="result"></div>

<script>
const branches = [
  {name:"دايتونا جيك2 الدورة شارع 60", lat:33.2330455, lng:44.3967521},
  {name:"المستنصرية", lat:33.3594789, lng:44.3953294},
   {name:"فحص باشا ساحة الواثق", lat:33.3140634, lng:44.4338601},
  {name:"فحص باشا علي الصالح", lat:33.34827561360025, lng:44.34224104588671},
  {name:"سونار العطاء", lat:33.76021493754072, lng:44.62939371142699},
  {name:"سونار الامان", lat:33.75798587085705, lng:44.62562667698385},
  {name:"سونار اوتو كار", lat:33.75692174221037, lng:44.62538636954892},
  {name:"توب كار الدورة", lat:33.259776625619835, lng:44.40968860737434},
  {name:"توب كار العامرية", lat:33.29226704514001, lng:44.28362009390121},
  {name:"علي المندلاوي نفق الشرطة", lat:33.3065103, lng:44.3233576}
];

function distance(a,b,c,d){
  return Math.sqrt((a-c)**2 + (b-d)**2);
}

function showResult(branch){
  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>${branch.name}</h2>

      <a class="btn maps" target="_blank"
      href="https://www.google.com/maps/dir/?api=1&destination=${branch.lat},${branch.lng}">
      🚗 فتح Google Maps
      </a>

      <a class="btn waze" onclick="openWaze(${branch.lat},${branch.lng})">
      🧭 فتح Waze
      </a>
    </div>
  `;
}

function openWaze(lat, lng){
  window.location = `waze://?ll=${lat},${lng}&navigate=yes`;

  setTimeout(()=>{
    window.location = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  },1500);
}

function findNearest(){
  navigator.geolocation.getCurrentPosition(function(pos){

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    let nearest = null;
    let min = Infinity;

    branches.forEach(function(b){
      let d = distance(lat,lng,b.lat,b.lng);
      if(d < min){
        min = d;
        nearest = b;
      }
    });

    showResult(nearest);

  }, function(){
    alert("فعل الموقع من المتصفح");
  });
}
</script>

</body>
</html>
