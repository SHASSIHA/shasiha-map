<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاصيها</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>📍 تحديد أقرب مركز</h2>

<button onclick="findNearest()" style="padding:15px;">تحديد موقعي</button>

<div id="result"></div>

<script>
const branches = [
  {name:"الدورة", lat:33.2330455, lng:44.3967521},
  {name:"المستنصرية", lat:33.3594789, lng:44.3953294}
];

function findNearest(){
  alert("اشتغل الزر"); // اختبار

  if (!navigator.geolocation){
    alert("الموقع غير مدعوم");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(pos){
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    let nearest = branches[0];
    document.getElementById("result").innerHTML = nearest.name;

  }, function(){
    alert("فعل الموقع");
  });
}
</script>

</body>
</html>
